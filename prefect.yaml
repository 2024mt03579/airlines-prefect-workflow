---
# Welcome to your prefect.yaml file! You can use this file for
# storing and managing configuration for deploying your flows.
# We recommend committing this file to source control along
# with your flow code.

# Generic metadata about this project
name: Assignment-Prefect
prefect-version: 3.6.22

# build section allows you to manage and build docker images
build: null

# push section allows you to manage if and how this project
# is uploaded to remote locations
push: null

# pull section allows you to provide instructions for cloning
# this project in remote locations
pull:
- prefect.deployments.steps.git_clone:
  repository: https://github.com/anuragvaishnava/API-Assignment-1.git
  branch: main
- prefect.deployments.steps.set_working_directory:
  directory: "{{ prefect.steps.git_clone.directory }}"
- prefect.deployments.steps.utility.pip_install_requirements:
  directory: "{{ prefect.steps.git_clone.directory }}"
  requirements_file: requirements.txt

# the deployments section allows you to provide configuration
# for deploying flows
deployments:
- name: pima-indian-workflow
  version: null
  tags:
  - first workflow
  description: Workflow deployment for pima indians pipeline
  schedule:
    interval: 120
  flow_name: workflow-pima-indians
  entrypoint: flows/workflow.py:workflow_pima_indians
  parameters: {}
  work_pool:
    name: wp1
    work_queue_name: default
    job_variables: {}
